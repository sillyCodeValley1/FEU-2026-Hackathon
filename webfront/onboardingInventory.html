<!doctype html>
<html lang="en" data-theme="dim">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>sillyCodeValley</title>
	</head>
	<body>
		<main>
			<div>
				<hgroup>
					<h2 class="italic">MakerCenter</h2>
					<em>"Build what you have. Find what you don't."</em>
				</hgroup>
			</div>

			<div class="page right active">
				<fieldset id="partsList">
					<legend>Fill out your materials</legend>
					<div class="row">
						<div class="max">
							<div class="field label prefix border">
								<i>search</i>
								<input type="text" />
								<label>Part Name</label>
							</div>
						</div>
						<div class="max">
							<div class="field border label">
								<input id="number" type="number" />
								<label>Quantity</label>
							</div>
						</div>
					</div>
				</fieldset>

				<div id="notif"></div>

				<br />
				<button
					id="addMaterial"
					class="square round extra primary absolute right"
				>
					<i>add</i>
				</button>
			</div>

			<div id="error"></div>

			<br /><br />
			<div class="onboardingNav">
				<button class="ripple responsive round fill large" onclick="window.location.href = 'onboardingProjects'">
					<i>arrow_forward</i>
					<span>Next</span>
				</button>
				<nav>
					<div class="center-align">
						<button class="fill circle small">
							<i>done</i>
						</button>
						<div class="small-margin">Welcome</div>
					</div>
					<hr class="max" />
					<div class="center-align">
						<button class="fill circle small"><i>done</i></button>
						<div class="small-margin">Inventory</div>
					</div>
					<hr class="max" />
					<div class="center-align">
						<button class="circle small">3</button>
						<div class="small-margin">Projects</div>
					</div>
				</nav>
			</div>
		</main>
	</body>

	<link
		href="https://cdn.jsdelivr.net/npm/beercss@4.0.21/dist/cdn/beer.min.css"
		rel="stylesheet"
	/>
	<script
		type="module"
		src="https://cdn.jsdelivr.net/npm/beercss@4.0.21/dist/cdn/beer.min.js"
	></script>
	<script
		type="module"
		src="https://cdn.jsdelivr.net/npm/material-dynamic-colors@1.1.4/dist/cdn/material-dynamic-colors.min.js"
	></script>
	<link rel="stylesheet" href="/src/beercssTheme.css" />
	<link rel="stylesheet" href="/src/style.css" />

	<script src="src/main.ts"></script>
	<script src="src/onboardingInventory.ts"></script>

	<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
	<script>
		eruda.init();
	</script>
</html>
